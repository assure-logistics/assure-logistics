kind = "web"
previewPath = "/marketing/"
title = "Assure Logistics — Marketing Site"
version = "1.0.0"
id = "artifacts/assure-marketing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/marketing/" ]
localPort = 22504

[services.development]
run = "pnpm --filter @workspace/assure-marketing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/assure-marketing", "run", "build" ]
publicDir = "artifacts/assure-marketing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22504"
BASE_PATH = "/marketing/"
