kind = "web"
previewPath = "/"
title = "Assure Logistics"
version = "1.0.0"
id = "artifacts/assure-logistics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24903

[services.development]
run = "pnpm --filter @workspace/assure-logistics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/assure-logistics", "run", "build" ]
publicDir = "artifacts/assure-logistics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24903"
BASE_PATH = "/"
