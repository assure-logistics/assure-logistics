services:
  - type: web
    name: assure-logistics-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: cd ../.. && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CONTACT_NOTIFY_EMAIL
        sync: false
